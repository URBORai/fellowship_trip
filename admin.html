<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin — 板橋團契出遊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">⛺ 板橋團契出遊</a>
      <button class="nav-toggle" id="navToggle">≡</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">首頁</a>
        <a href="schedule.html">行程</a>
        <a href="tasks.html">任務</a>
        <a href="expenses.html">財務</a>
        <a href="board.html">留言板</a>
        <a href="admin.html">Admin</a>
      </div>
      <div class="nav-user" id="navUser">
        <span id="userName"></span>
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.35)" onclick="logout()">登出</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Admin 管理後台</h1>
      <p>管理所有成員任務與留言</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('tasks', this)">任務總覽</button>
      <button class="tab-btn" onclick="switchTab('board', this)">留言管理</button>
      <button class="tab-btn" onclick="switchTab('users', this)">成員列表</button>
    </div>

    <!-- Tasks Tab -->
    <div class="tab-panel active" id="tab-tasks">
      <div id="adminTasks"><div class="loading">載入中…</div></div>
    </div>

    <!-- Board Tab -->
    <div class="tab-panel" id="tab-board">
      <div class="card">
        <div id="adminBoard"><div class="loading">載入中…</div></div>
      </div>
    </div>

    <!-- Users Tab -->
    <div class="tab-panel" id="tab-users">
      <div class="mb-3">
        <button class="btn btn-primary btn-sm" onclick="openAddUser()">➕ 新增成員</button>
      </div>
      <div class="card">
        <div id="adminUsers"><div class="loading">載入中…</div></div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="userModalOverlay" style="display:none">
    <div class="modal">
      <h3>新增成員</h3>
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="newUserName" maxlength="20" placeholder="例：小明">
      </div>
      <div class="form-group">
        <label>登入密語（成員用這個登入，不可與他人重複）</label>
        <input type="text" id="newUserPass" maxlength="50" placeholder="例：xiaoming2026">
      </div>
      <div class="form-group">
        <label>權限</label>
        <select id="newUserRole">
          <option value="NORMAL" selected>一般成員（NORMAL）</option>
          <option value="SYS_ADMIN">管理員（SYS_ADMIN）</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeAddUser()">取消</button>
        <button class="btn btn-primary" id="addUserBtn" onclick="submitAddUser()">新增</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const user = window.requireAdmin();
    if (!user) throw new Error('not admin');
    window.initNavbar('admin.html');

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadTasks() {
      const el = document.getElementById('adminTasks');
      try {
        const res = await window.authFetch('/api/tasks');
        const tasks = await res.json();
        if (!res.ok) throw new Error(tasks.error);

        if (tasks.length === 0) {
          el.innerHTML = '<div class="empty">目前沒有任務</div>';
          return;
        }

        const groups = {};
        tasks.forEach(t => {
          const name = t.users ? t.users.name : '未知';
          if (!groups[name]) groups[name] = [];
          groups[name].push(t);
        });

        el.innerHTML = '';
        Object.entries(groups).forEach(([name, list]) => {
          const done = list.filter(t => t.status === 'done').length;
          const pct = Math.round(done / list.length * 100);
          const div = document.createElement('div');
          div.className = 'card';
          div.innerHTML = `
            <div class="flex-between mb-2">
              <div style="display:flex;align-items:center;gap:0.5rem">
                <div class="avatar">${name.charAt(0)}</div>
                <span style="font-weight:700">${escHtml(name)}</span>
              </div>
              <span class="badge badge-done">${done}/${list.length} (${pct}%)</span>
            </div>
            <div style="background:var(--border);border-radius:99px;height:5px;margin-bottom:0.75rem">
              <div style="background:var(--success);height:5px;border-radius:99px;width:${pct}%"></div>
            </div>
            ${list.map(t => `
              <div class="task-item ${t.status === 'done' ? 'done' : ''}" id="task-${t.id}">
                <input type="checkbox" data-id="${t.id}" ${t.status === 'done' ? 'checked' : ''}>
                <div class="task-body">
                  <h3>${escHtml(t.title)}</h3>
                  ${t.content ? `<p>${escHtml(t.content)}</p>` : ''}
                </div>
                <span class="badge ${t.status === 'done' ? 'badge-done' : 'badge-pending'}">${t.status === 'done' ? '完成' : '待辦'}</span>
              </div>`).join('')}`;
          el.appendChild(div);
        });

        el.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          cb.addEventListener('change', () => toggleTask(cb.dataset.id, cb.checked));
        });
      } catch (e) {
        el.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
      }
    }

    async function toggleTask(id, isDone) {
      const status = isDone ? 'done' : 'pending';
      try {
        const res = await window.authFetch(`/api/tasks/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status })
        });
        if (!res.ok) { const d = await res.json(); window.showToast(d.error, 'err'); loadTasks(); return; }
        const row = document.getElementById(`task-${id}`);
        if (row) {
          row.classList.toggle('done', isDone);
          const badge = row.querySelector('.badge');
          if (badge) { badge.className = 'badge ' + (isDone ? 'badge-done' : 'badge-pending'); badge.textContent = isDone ? '完成' : '待辦'; }
        }
        window.showToast(isDone ? '✅ 已標記完成' : '↩️ 已取消', isDone ? 'ok' : '');
      } catch { window.showToast('網路錯誤', 'err'); }
    }

    async function loadBoard() {
      const el = document.getElementById('adminBoard');
      try {
        const res = await window.authFetch('/api/board');
        const posts = await res.json();
        if (!res.ok) throw new Error(posts.error);

        if (posts.length === 0) { el.innerHTML = '<div class="empty">目前沒有留言</div>'; return; }

        el.innerHTML = posts.map(p => `
          <div class="post-item" id="apost-${p.id}">
            <div class="post-header">
              <div style="display:flex;align-items:center;gap:0.5rem">
                <div class="avatar" style="width:30px;height:30px;font-size:0.75rem">${p.users ? p.users.name.charAt(0) : '?'}</div>
                <span class="post-author">${p.users ? escHtml(p.users.name) : '未知'}</span>
              </div>
              <div style="display:flex;align-items:center;gap:0.5rem">
                <span class="post-meta">${window.fmtDateTime(p.created_at)}</span>
                <button class="btn btn-ghost btn-sm" style="color:var(--danger);padding:0.2rem 0.4rem" onclick="deletePost('${p.id}')">🗑️</button>
              </div>
            </div>
            <div class="post-content">${escHtml(p.content)}</div>
          </div>`).join('');
      } catch (e) {
        el.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
      }
    }

    async function deletePost(id) {
      if (!confirm('確定要刪除這則留言嗎？')) return;
      try {
        const res = await window.authFetch(`/api/board/${id}`, { method: 'DELETE' });
        if (!res.ok) { const d = await res.json(); window.showToast(d.error, 'err'); return; }
        document.getElementById(`apost-${id}`)?.remove();
        window.showToast('已刪除', 'ok');
      } catch { window.showToast('網路錯誤', 'err'); }
    }

    async function loadUsers() {
      const el = document.getElementById('adminUsers');
      try {
        const res = await window.authFetch('/api/users-admin');
        const users = await res.json();
        if (!res.ok) throw new Error(users.error);

        if (users.length === 0) { el.innerHTML = '<div class="empty">目前沒有成員</div>'; return; }

        el.innerHTML = `
          <p class="text-muted text-sm mb-3">共 ${users.length} 位成員</p>
          ${users.map(u => `
            <div class="contact-item">
              <div class="avatar">${u.name.charAt(0)}</div>
              <div class="contact-info">
                <div class="name">${escHtml(u.name)}${u.id === user.id ? '（我）' : ''}</div>
                <div class="detail">ID: ${u.id.slice(0,8)}…</div>
              </div>
              ${u.id === user.id
                ? `<span class="badge badge-admin">SYS_ADMIN</span>`
                : `<select data-uid="${u.id}" data-prev="${u.role}" style="width:auto;padding:0.3rem 0.5rem;font-size:0.8rem;border:1.5px solid var(--border);border-radius:var(--radius);font-family:inherit">
                     <option value="NORMAL" ${u.role === 'NORMAL' ? 'selected' : ''}>NORMAL</option>
                     <option value="SYS_ADMIN" ${u.role === 'SYS_ADMIN' ? 'selected' : ''}>SYS_ADMIN</option>
                   </select>`}
            </div>`).join('')}`;

        el.querySelectorAll('select[data-uid]').forEach(sel => {
          sel.addEventListener('change', () => changeRole(sel));
        });
      } catch (e) {
        el.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
      }
    }

    async function changeRole(sel) {
      const id = sel.dataset.uid;
      const role = sel.value;
      if (!confirm(`確定將此成員權限改為 ${role === 'SYS_ADMIN' ? '管理員' : '一般成員'}？`)) {
        sel.value = sel.dataset.prev;
        return;
      }
      try {
        const res = await window.authFetch('/api/users-admin', {
          method: 'PATCH',
          body: JSON.stringify({ id, role })
        });
        const d = await res.json();
        if (!res.ok) { window.showToast(d.error, 'err'); sel.value = sel.dataset.prev; return; }
        sel.dataset.prev = role;
        window.showToast('權限已更新', 'ok');
      } catch {
        window.showToast('網路錯誤', 'err');
        sel.value = sel.dataset.prev;
      }
    }

    function openAddUser() {
      document.getElementById('newUserName').value = '';
      document.getElementById('newUserPass').value = '';
      document.getElementById('newUserRole').value = 'NORMAL';
      document.getElementById('userModalOverlay').style.display = 'flex';
    }

    function closeAddUser() {
      document.getElementById('userModalOverlay').style.display = 'none';
    }

    document.getElementById('userModalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeAddUser();
    });

    async function submitAddUser() {
      const name = document.getElementById('newUserName').value.trim();
      const passphrase = document.getElementById('newUserPass').value.trim();
      const role = document.getElementById('newUserRole').value;
      if (!name) return window.showToast('請輸入姓名', 'err');
      if (!passphrase) return window.showToast('請輸入密語', 'err');
      if (passphrase.length < 4) return window.showToast('密語至少 4 個字', 'err');

      const btn = document.getElementById('addUserBtn');
      btn.disabled = true;
      try {
        const res = await window.authFetch('/api/users-admin', {
          method: 'POST',
          body: JSON.stringify({ name, passphrase, role })
        });
        const d = await res.json();
        if (!res.ok) { window.showToast(d.error, 'err'); return; }
        closeAddUser();
        window.showToast(`已新增「${d.name}」，記得把密語告訴他`, 'ok');
        loadUsers();
      } catch {
        window.showToast('網路錯誤', 'err');
      } finally {
        btn.disabled = false;
      }
    }

    loadTasks();
    loadBoard();
    loadUsers();
  </script>
</body>
</html>
