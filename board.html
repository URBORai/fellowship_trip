<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>留言板 — 板橋團契出遊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">⛺ 板橋團契出遊</a>
      <button class="nav-toggle" id="navToggle">≡</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">首頁</a>
        <a href="schedule.html">行程</a>
        <a href="tasks.html">任務</a>
        <a href="expenses.html">財務</a>
        <a href="board.html">留言板</a>
      </div>
      <div class="nav-user" id="navUser">
        <span id="userName"></span>
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.35)" onclick="logout()">登出</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>留言板</h1>
      <p>分享心情、留下回憶 💬</p>
    </div>

    <div class="card">
      <p class="card-title">發表留言</p>
      <div class="form-group" id="guestNameGroup" style="display:none">
        <label>暱稱</label>
        <input type="text" id="guestName" placeholder="請輸入你的暱稱" maxlength="20">
      </div>
      <div class="form-group">
        <textarea id="content" placeholder="想說什麼都可以…" rows="3"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn btn-primary" id="postBtn" onclick="postMsg()">發表</button>
      </div>
    </div>

    <div class="card">
      <div id="postList"><div class="loading">載入中…</div></div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    window.initNavbar('board.html');
    const user = window.getUser();
    // 訪客也能留言，但要填暱稱（記在 localStorage，下次不用重打）
    if (!user) {
      document.getElementById('guestNameGroup').style.display = '';
      document.getElementById('guestName').value = localStorage.getItem('guest_name') || '';
    }

    async function load() {
      const el = document.getElementById('postList');
      try {
        const res = await window.authFetch('/api/board');
        const posts = await res.json();
        if (!res.ok) throw new Error(posts.error);

        if (posts.length === 0) {
          el.innerHTML = '<div class="empty">還沒有留言，來發第一篇吧！</div>';
          return;
        }

        postCache = {};
        el.innerHTML = posts.map(p => {
          postCache[p.id] = p;
          const isOwner = user && p.created_by === user.id;
          const isAdmin = user && user.role === 'SYS_ADMIN';
          const canDelete = isOwner || isAdmin;
          return `
            <div class="post-item" id="post-${p.id}">
              <div class="post-header">
                <div style="display:flex;align-items:center;gap:0.5rem">
                  <div class="avatar" style="width:32px;height:32px;font-size:0.8rem">${p.users ? p.users.name.charAt(0) : (p.guest_name ? p.guest_name.charAt(0) : '?')}</div>
                  <span class="post-author">${p.users ? escHtml(p.users.name) : (p.guest_name ? escHtml(p.guest_name) + '（訪客）' : '未知')}</span>
                </div>
                <div style="display:flex;align-items:center;gap:0.5rem">
                  <span class="post-meta">${window.fmtDateTime(p.created_at)}</span>
                  ${isAdmin ? `<button class="btn btn-ghost btn-sm" style="padding:0.2rem 0.4rem" onclick="editPost('${p.id}')">✏️ 編輯</button>` : ''}
                  ${canDelete ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger);padding:0.2rem 0.4rem" onclick="deletePost('${p.id}')">🗑️ 刪除</button>` : ''}
                </div>
              </div>
              <div class="post-content" id="postContent-${p.id}">${escHtml(p.content)}</div>
            </div>`;
        }).join('');
      } catch (e) {
        el.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
      }
    }

    async function postMsg() {
      const content = document.getElementById('content').value.trim();
      if (!content) { window.showToast('請輸入內容', 'err'); return; }

      const body = { content };
      if (!user) {
        const name = document.getElementById('guestName').value.trim();
        if (!name) { window.showToast('請輸入暱稱', 'err'); return; }
        localStorage.setItem('guest_name', name);
        body.guest_name = name;
      }

      const btn = document.getElementById('postBtn');
      btn.disabled = true;
      try {
        const res = await window.authFetch('/api/board', {
          method: 'POST',
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { window.showToast(data.error, 'err'); return; }
        document.getElementById('content').value = '';
        window.showToast('✅ 已發表留言', 'ok');
        load();
      } catch { window.showToast('網路錯誤', 'err'); }
      finally { btn.disabled = false; }
    }

    let postCache = {};

    // 管理員行內編輯留言
    function editPost(id) {
      const p = postCache[id];
      const el = document.getElementById(`postContent-${id}`);
      if (!p || !el) return;
      el.innerHTML = `
        <div class="form-group" style="margin-bottom:0.5rem">
          <textarea id="editContent-${id}" rows="3" maxlength="500"></textarea>
        </div>
        <div style="display:flex;gap:0.5rem;justify-content:flex-end">
          <button class="btn btn-sm" onclick="load()">取消</button>
          <button class="btn btn-primary btn-sm" onclick="savePost('${id}')">儲存</button>
        </div>`;
      const ta = document.getElementById(`editContent-${id}`);
      ta.value = p.content;
      ta.focus();
    }

    async function savePost(id) {
      const content = document.getElementById(`editContent-${id}`).value.trim();
      if (!content) { window.showToast('請輸入內容', 'err'); return; }
      try {
        const res = await window.authFetch(`/api/board/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ content })
        });
        const data = await res.json();
        if (!res.ok) { window.showToast(data.error || '更新失敗', 'err'); return; }
        window.showToast('✅ 已更新留言', 'ok');
      } catch { window.showToast('網路錯誤', 'err'); }
      load();
    }

    async function deletePost(id) {
      if (!confirm('確定要刪除這則留言嗎？')) return;
      try {
        const res = await window.authFetch(`/api/board/${id}`, { method: 'DELETE' });
        if (!res.ok) { const d = await res.json(); window.showToast(d.error, 'err'); return; }
        document.getElementById(`post-${id}`)?.remove();
        window.showToast('已刪除', 'ok');
        if (!document.querySelector('.post-item')) {
          document.getElementById('postList').innerHTML = '<div class="empty">還沒有留言，來發第一篇吧！</div>';
        }
      } catch { window.showToast('網路錯誤', 'err'); }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Submit on Ctrl+Enter
    document.getElementById('content').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) postMsg();
    });

    load();
  </script>
</body>
</html>
