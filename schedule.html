<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>行程 — 板橋團契出遊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">⛺ 板橋團契出遊</a>
      <button class="nav-toggle" id="navToggle">≡</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">首頁</a>
        <a href="schedule.html">行程</a>
        <a href="tasks.html">任務</a>
        <a href="expenses.html">財務</a>
        <a href="board.html">留言板</a>
      </div>
      <div class="nav-user" id="navUser">
        <span id="userName"></span>
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.35)" onclick="logout()">登出</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div id="scheduleContent"></div>
  </main>

  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal modal-wide" id="modalBox">
      <h3 id="modalTitle"></h3>
      <div class="modal-scroll" id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="modalSaveBtn">儲存</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    window.initNavbar('schedule.html', false);
    const user = window.getUser();
    const isAdmin = !!(user && user.role === 'SYS_ADMIN');
    if (isAdmin) {
      const links = document.getElementById('navLinks');
      const a = document.createElement('a');
      a.href = '/admin.html';
      a.textContent = 'Admin';
      links.appendChild(a);
    }

    const DAY_COLORS = [
      { value: '', label: '橘（預設）' },
      { value: '#7C3AED', label: '紫' },
      { value: '#059669', label: '綠' },
      { value: '#2563EB', label: '藍' },
      { value: '#DC2626', label: '紅' }
    ];

    // 預設內容：site_content 表沒有資料（或 API 失敗）時顯示；
    // 管理員第一次儲存後，以資料庫內容為準
    const DEFAULT_SCHEDULE = {
      header: {
        title: '三天行程表',
        subtitle: '7/10（五）18:30 出發 ‧ 7/12（日）16:00 平安回家'
      },
      days: [
        {
          badge: '第一天', color: '', title: '出發日 · 7 月 10 日（五）', note: '',
          items: [
            { time: '18:00', title: '集合 🚩', desc: '真耶穌教會新埔教會', highlight: true },
            { time: '18:30', title: '前往彥霖家 🚗', desc: '高速公路，預計 20:00 抵達', highlight: false },
            { time: '20:15', title: '送舊活動（含消夜）🎉', desc: '彥霖家（關西）', highlight: true }
          ]
        },
        {
          badge: '第二天', color: '#7C3AED', title: '安息日 · 7 月 11 日（六）',
          note: '📌 宣真因神訓班，於 18:30 先行離隊（火車：新竹站 19:53 新自強）',
          items: [
            { time: '07:30', title: '起床', desc: '各自房間', highlight: false },
            { time: '08:00', title: '早餐 ☕', desc: '彥霖家', highlight: false },
            { time: '09:30', title: '上下午聚會 ＆ 中午愛餐 🙏', desc: '真耶穌教會關西教會', highlight: true },
            { time: '16:00', title: '吃冰 ＆ 買烤肉食材 🛒', desc: '關西囍冰室 ＆ 全聯', highlight: false },
            { time: '17:00', title: '烤肉 BBQ 🔥', desc: '彥霖家，預計至 21:30', highlight: true }
          ]
        },
        {
          badge: '第三天', color: '#059669', title: '回程日 · 7 月 12 日（日）', note: '',
          items: [
            { time: '09:00', title: '起床', desc: '各自房間', highlight: false },
            { time: '09:30', title: '早餐 ☕', desc: '彥霖家', highlight: false },
            { time: '10:30', title: '團契時間 🙏', desc: '彥霖家', highlight: true },
            { time: '12:00', title: '前往內灣老街 🚗', desc: '高速公路，預計 12:30 抵達', highlight: false },
            { time: '12:30', title: '逛老街 🛍️', desc: '內灣老街', highlight: true },
            { time: '14:30', title: '前往竹東莫內咖啡館 🚗', desc: '台三線', highlight: false },
            { time: '15:00', title: '下午茶 ☕', desc: '竹東莫內咖啡館', highlight: true },
            { time: '16:00', title: '平安回家 🏠', desc: '活動圓滿結束！', highlight: false }
          ]
        }
      ],
      footer: '⚠️ 以上行程依規劃案整理，實際時間以負責人公告為準。'
    };

    let data = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));

    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function render() {
      const el = document.getElementById('scheduleContent');
      const daysHtml = data.days.map((day, di) => `
        <div class="day-section">
          <div class="day-header">
            <span class="day-badge"${day.color ? ` style="background:${escHtml(day.color)}"` : ''}>${escHtml(day.badge)}</span>
            <h2 style="flex:1">${escHtml(day.title)}</h2>
            ${isAdmin ? `<button class="edit-btn" onclick="openDayEditor(${di})">✏️ 編輯</button>` : ''}
          </div>
          <div class="card">
            <div class="timeline">
              ${day.items.map(it => `
                <div class="tl-item${it.highlight ? ' highlight' : ''}">
                  <div class="tl-time">${escHtml(it.time)}</div>
                  <div class="tl-title">${escHtml(it.title)}</div>
                  ${it.desc ? `<div class="tl-desc">${escHtml(it.desc)}</div>` : ''}
                </div>`).join('')}
            </div>
          </div>
          ${day.note ? `
          <div class="card" style="background:#FEF3C7;border:1.5px solid #FDE68A;margin-top:0.75rem">
            <p style="font-size:0.85rem;color:#92400E;margin:0">${escHtml(day.note)}</p>
          </div>` : ''}
        </div>`).join('');

      el.innerHTML = `
        <div class="page-header">
          <h1>${escHtml(data.header.title)}</h1>
          <p>${escHtml(data.header.subtitle)}</p>
          ${isAdmin ? `<div class="mt-3"><button class="edit-btn" onclick="openHeaderEditor()">✏️ 編輯標題與底部備註</button></div>` : ''}
        </div>
        ${daysHtml}
        ${isAdmin ? `<div class="mb-3"><button class="btn btn-outline btn-sm btn-full" onclick="addDay()">➕ 新增一天</button></div>` : ''}
        ${data.footer ? `
        <div class="card" style="background:#FFFBEB;border:1.5px solid #FDE68A">
          <p style="font-size:0.875rem;color:#92400E;margin:0">${escHtml(data.footer)}</p>
        </div>` : ''}`;
    }

    // ====== 讀取資料庫內容 ======
    async function load() {
      try {
        const res = await fetch('/api/site-content?key=schedule');
        if (!res.ok) return;
        const body = await res.json();
        if (body && body.content) {
          // 與預設值淺合併，避免資料缺少欄位時整頁掛掉
          data = Object.assign({}, JSON.parse(JSON.stringify(DEFAULT_SCHEDULE)), body.content);
          render();
        }
      } catch (e) {
        // API 失敗時維持預設內容
        console.error('載入行程內容失敗：', e);
      }
    }

    // ====== 編輯功能（僅管理員） ======
    let draft = null;          // 編輯中的整份資料副本
    let editingDay = -1;       // -1 = 編輯標題區

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      draft = null;
      editingDay = -1;
    }

    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    function openHeaderEditor() {
      draft = JSON.parse(JSON.stringify(data));
      editingDay = -1;
      document.getElementById('modalTitle').textContent = '編輯標題與底部備註';
      document.getElementById('modalBody').innerHTML = `
        <div class="form-group">
          <label>頁面標題</label>
          <input type="text" id="f_title" value="${escHtml(draft.header.title)}" maxlength="30">
        </div>
        <div class="form-group">
          <label>副標題</label>
          <input type="text" id="f_subtitle" value="${escHtml(draft.header.subtitle)}" maxlength="80">
        </div>
        <div class="form-group">
          <label>底部備註（留空則不顯示）</label>
          <textarea id="f_footer" rows="2" maxlength="200">${escHtml(draft.footer)}</textarea>
        </div>`;
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function openDayEditor(di) {
      draft = JSON.parse(JSON.stringify(data));
      editingDay = di;
      document.getElementById('modalTitle').textContent = `編輯 ${draft.days[di].badge}`;
      renderDayEditor();
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function renderDayEditor() {
      const day = draft.days[editingDay];
      const body = document.getElementById('modalBody');
      body.innerHTML = `
        <div class="form-row">
          <div class="form-group">
            <label>標籤（如：第一天）</label>
            <input type="text" id="f_badge" value="${escHtml(day.badge)}" maxlength="10">
          </div>
          <div class="form-group">
            <label>標籤顏色</label>
            <select id="f_color">
              ${DAY_COLORS.map(c => `<option value="${c.value}"${day.color === c.value ? ' selected' : ''}>${c.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>當天標題</label>
          <input type="text" id="f_daytitle" value="${escHtml(day.title)}" maxlength="40">
        </div>
        <div class="form-group">
          <label>當天備註（留空則不顯示）</label>
          <textarea id="f_note" rows="2" maxlength="200">${escHtml(day.note || '')}</textarea>
        </div>
        <hr class="divider">
        ${day.items.map((it, i) => `
          <div class="editor-item">
            <div class="editor-item-head">
              <span class="idx">行程 ${i + 1}</span>
              <div class="editor-item-tools">
                <button class="editor-tool-btn" onclick="moveItem(${i},-1)" ${i === 0 ? 'disabled' : ''} title="上移">↑</button>
                <button class="editor-tool-btn" onclick="moveItem(${i},1)" ${i === day.items.length - 1 ? 'disabled' : ''} title="下移">↓</button>
                <button class="editor-tool-btn danger" onclick="removeItem(${i})" title="刪除">✕</button>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>時間</label>
                <input type="text" data-i="${i}" data-f="time" value="${escHtml(it.time)}" maxlength="15" placeholder="18:00">
              </div>
              <div class="form-group">
                <label style="visibility:hidden">重點</label>
                <label class="editor-check">
                  <input type="checkbox" data-i="${i}" data-f="highlight"${it.highlight ? ' checked' : ''}> 重點行程
                </label>
              </div>
            </div>
            <div class="form-group">
              <label>標題</label>
              <input type="text" data-i="${i}" data-f="title" value="${escHtml(it.title)}" maxlength="50">
            </div>
            <div class="form-group">
              <label>說明（選填）</label>
              <input type="text" data-i="${i}" data-f="desc" value="${escHtml(it.desc || '')}" maxlength="80">
            </div>
          </div>`).join('')}
        <button class="btn btn-outline btn-sm btn-full" onclick="addItem()">➕ 新增行程項目</button>
        <hr class="divider">
        <button class="btn btn-danger btn-sm btn-full" onclick="markDeleteDay()">🗑️ 刪除這一天</button>`;

      body.querySelectorAll('input[data-i]').forEach(inp => {
        inp.addEventListener('input', () => {
          const it = draft.days[editingDay].items[+inp.dataset.i];
          if (inp.dataset.f === 'highlight') it.highlight = inp.checked;
          else it[inp.dataset.f] = inp.value;
        });
      });
    }

    function syncDayFields() {
      const day = draft.days[editingDay];
      day.badge = document.getElementById('f_badge').value.trim();
      day.color = document.getElementById('f_color').value;
      day.title = document.getElementById('f_daytitle').value.trim();
      day.note = document.getElementById('f_note').value.trim();
    }

    function addItem() {
      syncDayFields();
      draft.days[editingDay].items.push({ time: '', title: '', desc: '', highlight: false });
      renderDayEditor();
    }

    function removeItem(i) {
      syncDayFields();
      draft.days[editingDay].items.splice(i, 1);
      renderDayEditor();
    }

    function moveItem(i, dir) {
      syncDayFields();
      const arr = draft.days[editingDay].items;
      const j = i + dir;
      if (j < 0 || j >= arr.length) return;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      renderDayEditor();
    }

    function markDeleteDay() {
      if (!confirm(`確定要刪除「${draft.days[editingDay].badge}」整天的行程嗎？`)) return;
      draft.days.splice(editingDay, 1);
      save(draft);
    }

    function addDay() {
      draft = JSON.parse(JSON.stringify(data));
      draft.days.push({
        badge: `第${['一','二','三','四','五','六','七'][draft.days.length] || draft.days.length + 1}天`,
        color: '', title: '', note: '',
        items: [{ time: '09:00', title: '', desc: '', highlight: false }]
      });
      editingDay = draft.days.length - 1;
      document.getElementById('modalTitle').textContent = '新增一天';
      renderDayEditor();
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    document.getElementById('modalSaveBtn').addEventListener('click', () => {
      if (editingDay === -1) {
        draft.header.title = document.getElementById('f_title').value.trim();
        draft.header.subtitle = document.getElementById('f_subtitle').value.trim();
        draft.footer = document.getElementById('f_footer').value.trim();
        if (!draft.header.title) return showToast('請輸入頁面標題', 'err');
      } else {
        syncDayFields();
        const day = draft.days[editingDay];
        if (!day.badge || !day.title) return showToast('請輸入標籤與當天標題', 'err');
        day.items = day.items.filter(it => (it.time + it.title + (it.desc || '')).trim() !== '');
        if (day.items.length === 0) return showToast('至少要有一個行程項目', 'err');
      }
      save(draft);
    });

    async function save(newData) {
      const btn = document.getElementById('modalSaveBtn');
      btn.disabled = true;
      try {
        const res = await authFetch('/api/site-content', {
          method: 'PUT',
          body: JSON.stringify({ key: 'schedule', content: newData })
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || '儲存失敗');
        data = newData;
        render();
        closeModal();
        showToast('已儲存', 'ok');
      } catch (e) {
        showToast(e.message || '儲存失敗', 'err');
        btn.disabled = false;
        return;
      }
      btn.disabled = false;
    }

    render();
    load();
  </script>
</body>
</html>
