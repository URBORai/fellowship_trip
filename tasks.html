<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>任務 — 板橋團契出遊</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .photo-slot {
      position: relative; aspect-ratio: 1; border: 2px dashed var(--border, #d1d5db);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: rgba(0,0,0,0.03);
    }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .photo-slot .slot-actions {
      position: absolute; bottom: 6px; right: 6px; display: flex; gap: 4px;
    }
    .photo-slot .slot-actions .btn {
      background: rgba(0,0,0,0.55); color: #fff; border: none; padding: 0.25rem 0.45rem;
    }
    .photo-empty { cursor: pointer; text-align: center; color: #9ca3af; }
    .mini-slot { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; display: block; cursor: pointer; }
    .mini-slot-empty { width: 36px; height: 36px; border: 1.5px dashed #d1d5db; border-radius: 6px; }

    /* 幻燈片（管理員全螢幕瀏覽全員照片） */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000; background: rgba(10,10,12,0.97);
      display: none; flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lightbox-top {
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
      padding: max(0.75rem, env(safe-area-inset-top, 0px)) 1rem 0.5rem; color: #fff;
    }
    .lightbox-caption { font-weight: 700; font-size: 1.05rem; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lightbox-counter { color: rgba(255,255,255,0.65); font-size: 0.85rem; flex-shrink: 0; }
    .lightbox-stage { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 0.5rem 1rem; }
    .lightbox-stage img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
    .lightbox-bottom {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem; flex-wrap: wrap;
      padding: 0.6rem 1rem calc(0.9rem + env(safe-area-inset-bottom, 0px));
    }
    .lightbox-btn {
      background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25);
      border-radius: 99px; padding: 0.5rem 1.1rem; font-size: 1rem; cursor: pointer;
    }
    .lightbox-btn:hover { background: rgba(255,255,255,0.22); }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">⛺ 板橋團契出遊</a>
      <button class="nav-toggle" id="navToggle">≡</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">首頁</a>
        <a href="schedule.html">行程</a>
        <a href="tasks.html">任務</a>
        <a href="expenses.html">財務</a>
        <a href="board.html">留言板</a>
      </div>
      <div class="nav-user" id="navUser">
        <span id="userName"></span>
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.35)" onclick="logout()">登出</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>任務清單</h1>
      <p id="pageDesc">我的待辦事項</p>
    </div>

    <!-- 照片任務：每人固定 3 格 -->
    <div class="card">
      <div class="flex-between mb-3">
        <p class="card-title" style="margin:0">📸 照片任務：上傳 3 張出遊照片</p>
        <span class="badge badge-pending" id="photoCount">0 / 3</span>
      </div>
      <p class="text-muted text-sm mb-3">單張上限 10MB，可隨時更換或刪除</p>
      <div class="photo-grid" id="photoGrid"><div class="loading">載入中…</div></div>
    </div>

    <!-- 全員照片繳交狀況（僅 SYS_ADMIN 顯示） -->
    <div class="card" id="photoOverviewCard" style="display:none">
      <div class="flex-between mb-3">
        <p class="card-title" style="margin:0">全員照片繳交狀況</p>
        <button class="btn btn-primary btn-sm" onclick="openSlideshow(0)">▶ 幻燈片播放</button>
      </div>
      <div id="photoOverview"><div class="loading">載入中…</div></div>
    </div>

    <!-- 指派任務（僅 SYS_ADMIN 顯示） -->
    <div class="card" id="assignCard" style="display:none">
      <p class="card-title">指派任務</p>
      <div class="form-row">
        <div class="form-group">
          <label>成員</label>
          <select id="assignUser"><option>載入中…</option></select>
        </div>
        <div class="form-group">
          <label>任務標題</label>
          <input type="text" id="assignTitle" placeholder="例：準備烤肉用具">
        </div>
      </div>
      <div class="form-group">
        <label>說明（選填）</label>
        <input type="text" id="assignContent" placeholder="補充細節…">
      </div>
      <button class="btn btn-primary" id="assignBtn" onclick="assignTask()">指派任務</button>
    </div>

    <div id="taskList"><div class="loading">載入中…</div></div>
  </main>

  <!-- 幻燈片燈箱（管理員） -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-top">
      <div class="lightbox-caption" id="lbCaption"></div>
      <div style="display:flex;align-items:center;gap:0.75rem;flex-shrink:0">
        <span class="lightbox-counter" id="lbCounter"></span>
        <button class="lightbox-btn" style="padding:0.35rem 0.8rem" id="lbFsBtn" onclick="toggleFullscreen()" title="切換全螢幕">⛶ 全螢幕</button>
        <button class="lightbox-btn" style="padding:0.35rem 0.8rem" onclick="closeSlideshow()" title="關閉幻燈片">✕ 關閉</button>
      </div>
    </div>
    <div class="lightbox-stage"><img id="lbImg" alt=""></div>
    <div class="lightbox-bottom">
      <button class="lightbox-btn" onclick="stepSlide(-1)" title="上一張">← 上一張</button>
      <button class="lightbox-btn" id="lbPlayBtn" onclick="toggleAutoplay()" title="自動播放">▶ 自動播放</button>
      <button class="lightbox-btn" onclick="stepSlide(1)" title="下一張">下一張 →</button>
      <label class="lightbox-btn" title="更換這張照片">🔄 更換<input type="file" accept="image/*" hidden onchange="lbReplace(this)"></label>
      <button class="lightbox-btn" onclick="lbDelete()" title="刪除這張照片">🗑️ 刪除</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const user = window.requireAuth();
    if (!user) throw new Error('not authed');
    window.initNavbar('tasks.html');

    const isAdmin = user.role === 'SYS_ADMIN';
    if (isAdmin) {
      document.getElementById('pageDesc').textContent = '所有人的任務（Admin 視角）';
      document.getElementById('assignCard').style.display = '';
      document.getElementById('photoOverviewCard').style.display = '';
      loadMembers();
      loadPhotoOverview();
    }

    // ===== 照片任務 =====
    const MAX_PHOTO_BYTES = 10 * 1024 * 1024;

    async function loadPhotos() {
      const grid = document.getElementById('photoGrid');
      try {
        const res = await window.authFetch('/api/photos');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        renderPhotoGrid(data.slots || {});
      } catch (e) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1">載入失敗：${e.message}</div>`;
      }
    }

    function renderPhotoGrid(slots) {
      const grid = document.getElementById('photoGrid');
      let count = 0;
      grid.innerHTML = [1, 2, 3].map(n => {
        const url = slots[n];
        if (url) {
          count++;
          return `
            <div class="photo-slot">
              <img src="${url}" alt="照片 ${n}">
              <div class="slot-actions">
                <label class="btn btn-sm" title="更換這張照片">🔄 更換<input type="file" accept="image/*" hidden onchange="uploadPhoto(${n}, this)"></label>
                <button class="btn btn-sm" title="刪除這張照片" onclick="deletePhoto(${n})">🗑️ 刪除</button>
              </div>
            </div>`;
        }
        return `
          <label class="photo-slot photo-empty">
            <div><div style="font-size:1.6rem">＋</div><div style="font-size:0.75rem">上傳照片 ${n}</div></div>
            <input type="file" accept="image/*" hidden onchange="uploadPhoto(${n}, this)">
          </label>`;
      }).join('');
      const badge = document.getElementById('photoCount');
      badge.textContent = `${count} / 3`;
      badge.className = 'badge ' + (count === 3 ? 'badge-done' : 'badge-pending');
    }

    // 共用上傳流程：跟後端要簽名上傳網址，再把檔案直傳 Supabase Storage（不經過 Vercel）。
    // targetUserId 省略時上傳到自己的格子；管理員可指定任何成員。
    async function doUpload(slot, file, targetUserId) {
      if (file.size > MAX_PHOTO_BYTES) {
        window.showToast(`這張照片 ${(file.size / 1048576).toFixed(1)}MB，超過 10MB 上限，請換一張或先壓縮`, 'err');
        return false;
      }
      window.showToast('上傳中，請稍候…');
      try {
        const body = { slot };
        if (targetUserId) body.user_id = targetUserId;
        const res = await window.authFetch('/api/photos', {
          method: 'POST',
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { window.showToast(data.error, 'err'); return false; }

        const up = await fetch(data.uploadUrl, {
          method: 'PUT',
          headers: { 'Content-Type': file.type || 'application/octet-stream', 'x-upsert': 'true' },
          body: file
        });
        if (!up.ok) {
          let msg = '';
          try { msg = (JSON.parse(await up.text()) || {}).message || ''; } catch { /* 非 JSON 回應 */ }
          window.showToast(`上傳失敗（${up.status}${msg ? '：' + msg : ''}），請再試一次`, 'err');
          return false;
        }

        window.showToast('✅ 照片已上傳', 'ok');
        return true;
      } catch { window.showToast('網路錯誤', 'err'); return false; }
    }

    async function uploadPhoto(slot, input) {
      const file = input.files && input.files[0];
      input.value = '';
      if (!file) return;
      if (await doUpload(slot, file)) {
        loadPhotos();
        if (isAdmin) loadPhotoOverview();
      }
    }

    // 管理員替成員上傳（總覽的空格子）
    async function adminUploadPhoto(userId, slot, input) {
      const file = input.files && input.files[0];
      input.value = '';
      if (!file) return;
      if (await doUpload(slot, file, userId)) {
        loadPhotoOverview();
        if (userId === user.id) loadPhotos();
      }
    }

    async function deletePhoto(slot) {
      if (!confirm('確定要刪除這張照片嗎？')) return;
      try {
        const res = await window.authFetch(`/api/photos?slot=${slot}`, { method: 'DELETE' });
        if (!res.ok) { const d = await res.json(); window.showToast(d.error, 'err'); return; }
        window.showToast('已刪除', 'ok');
        loadPhotos();
        if (isAdmin) loadPhotoOverview();
      } catch { window.showToast('網路錯誤', 'err'); }
    }

    async function loadPhotoOverview() {
      const el = document.getElementById('photoOverview');
      try {
        const res = await window.authFetch('/api/photos?all=1');
        const list = await res.json();
        if (!res.ok) throw new Error(list.error);

        // 把所有人的照片攤平成幻燈片清單，縮圖點擊直接跳到那一張
        slideshowPhotos = [];
        el.innerHTML = list.map(u => {
          const c = Object.keys(u.slots).length;
          return `
            <div class="contact-item">
              <div class="avatar">${escHtml(u.name.charAt(0))}</div>
              <div class="contact-info"><div class="name">${escHtml(u.name)}</div></div>
              <div style="display:flex;gap:4px;align-items:center">
                ${[1, 2, 3].map(n => {
                  if (!u.slots[n]) {
                    // 空格子：管理員可直接替成員補上傳
                    return `<label class="mini-slot-empty" style="cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:0.55rem;line-height:1" title="替 ${escAttr(u.name)} 上傳照片 ${n}">＋上傳<input type="file" accept="image/*" hidden onchange="adminUploadPhoto('${u.id}', ${n}, this)"></label>`;
                  }
                  const idx = slideshowPhotos.push({ userId: u.id, name: u.name, slot: n, url: u.slots[n] }) - 1;
                  return `<img class="mini-slot" src="${u.slots[n]}" onclick="openSlideshow(${idx})">`;
                }).join('')}
                <span class="badge ${c === 3 ? 'badge-done' : 'badge-pending'}" style="margin-left:6px">${c}/3</span>
              </div>
            </div>`;
        }).join('');
      } catch (e) {
        el.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
      }
    }

    // ===== 幻燈片（全螢幕瀏覽全員照片） =====
    let slideshowPhotos = [];
    let slideIdx = 0;
    let slideTimer = null;

    function openSlideshow(idx) {
      if (!slideshowPhotos.length) { window.showToast('目前還沒有任何照片', 'err'); return; }
      slideIdx = Math.min(Math.max(idx || 0, 0), slideshowPhotos.length - 1);
      const lb = document.getElementById('lightbox');
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      renderSlide();
    }

    function closeSlideshow() {
      stopAutoplay();
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      if (fsElement()) exitFs();
    }

    // ===== 全螢幕切換（含 Safari 的 webkit 前綴） =====
    function fsElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    function exitFs() {
      if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }

    function toggleFullscreen() {
      const lb = document.getElementById('lightbox');
      if (fsElement()) { exitFs(); return; }
      if (lb.requestFullscreen) lb.requestFullscreen().catch(() => window.showToast('此裝置不支援全螢幕', 'err'));
      else if (lb.webkitRequestFullscreen) lb.webkitRequestFullscreen();
      else window.showToast('此裝置不支援全螢幕', 'err');
    }

    function updateFsBtn() {
      document.getElementById('lbFsBtn').textContent = fsElement() ? '⛶ 離開全螢幕' : '⛶ 全螢幕';
    }
    document.addEventListener('fullscreenchange', updateFsBtn);
    document.addEventListener('webkitfullscreenchange', updateFsBtn);

    // 完全不支援全螢幕的裝置（如 iPhone Safari）就把按鈕藏起來
    if (!document.getElementById('lightbox').requestFullscreen &&
        !document.getElementById('lightbox').webkitRequestFullscreen) {
      document.getElementById('lbFsBtn').style.display = 'none';
    }

    function renderSlide() {
      const p = slideshowPhotos[slideIdx];
      document.getElementById('lbImg').src = p.url;
      document.getElementById('lbCaption').textContent = `${p.name} — 照片 ${p.slot}`;
      document.getElementById('lbCounter').textContent = `${slideIdx + 1} / ${slideshowPhotos.length}`;
      // 預載下一張，播放時比較順
      const next = slideshowPhotos[(slideIdx + 1) % slideshowPhotos.length];
      if (next) { const img = new Image(); img.src = next.url; }
    }

    function stepSlide(step) {
      const len = slideshowPhotos.length;
      if (!len) return;
      slideIdx = (slideIdx + step + len) % len;
      renderSlide();
    }

    function toggleAutoplay() {
      if (slideTimer) { stopAutoplay(); return; }
      slideTimer = setInterval(() => stepSlide(1), 3500);
      document.getElementById('lbPlayBtn').textContent = '⏸ 暫停';
    }

    function stopAutoplay() {
      if (slideTimer) { clearInterval(slideTimer); slideTimer = null; }
      document.getElementById('lbPlayBtn').textContent = '▶ 自動播放';
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeSlideshow();
      else if (e.key === 'ArrowRight') stepSlide(1);
      else if (e.key === 'ArrowLeft') stepSlide(-1);
      else if (e.key === ' ') { e.preventDefault(); toggleAutoplay(); }
      else if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    });

    // 燈箱內更換目前這張照片（管理員可換任何人的）
    async function lbReplace(input) {
      const file = input.files && input.files[0];
      input.value = '';
      const p = slideshowPhotos[slideIdx];
      if (!file || !p) return;
      stopAutoplay();
      if (!(await doUpload(p.slot, file, p.userId))) return;
      await loadPhotoOverview();
      if (p.userId === user.id) loadPhotos();
      // 重建清單後找回同一格（張數沒變，網址會換新）
      const idx = slideshowPhotos.findIndex(q => q.userId === p.userId && q.slot === p.slot);
      slideIdx = idx >= 0 ? idx : Math.min(slideIdx, slideshowPhotos.length - 1);
      renderSlide();
    }

    // 燈箱內刪除目前這張照片
    async function lbDelete() {
      const p = slideshowPhotos[slideIdx];
      if (!p) return;
      stopAutoplay();
      if (!confirm(`確定要刪除 ${p.name} 的照片 ${p.slot} 嗎？`)) return;
      try {
        const res = await window.authFetch(`/api/photos?slot=${p.slot}&user_id=${p.userId}`, { method: 'DELETE' });
        if (!res.ok) { const d = await res.json(); window.showToast(d.error, 'err'); return; }
        window.showToast('已刪除', 'ok');
      } catch { window.showToast('網路錯誤', 'err'); return; }
      await loadPhotoOverview();
      if (p.userId === user.id) loadPhotos();
      if (!slideshowPhotos.length) { closeSlideshow(); return; }
      slideIdx = Math.min(slideIdx, slideshowPhotos.length - 1);
      renderSlide();
    }

    async function loadMembers() {
      const sel = document.getElementById('assignUser');
      try {
        const res = await window.authFetch('/api/users-admin');
        const users = await res.json();
        if (!res.ok) throw new Error(users.error);
        // 管理員不參加任務，只列出一般成員
        const members = users.filter(u => u.role === 'NORMAL');
        sel.innerHTML = members.length
          ? members.map(u => `<option value="${u.id}">${escHtml(u.name)}</option>`).join('')
          : '<option value="">（沒有一般成員）</option>';
      } catch {
        sel.innerHTML = '<option value="">載入成員失敗</option>';
      }
    }

    async function assignTask() {
      const user_id = document.getElementById('assignUser').value;
      const title = document.getElementById('assignTitle').value.trim();
      const content = document.getElementById('assignContent').value.trim();
      if (!user_id || !title) { window.showToast('請選擇成員並填寫任務標題', 'err'); return; }

      const btn = document.getElementById('assignBtn');
      btn.disabled = true;
      try {
        const res = await window.authFetch('/api/tasks', {
          method: 'POST',
          body: JSON.stringify({ user_id, title, content })
        });
        const data = await res.json();
        if (!res.ok) { window.showToast(data.error, 'err'); return; }
        document.getElementById('assignTitle').value = '';
        document.getElementById('assignContent').value = '';
        window.showToast('✅ 已指派任務', 'ok');
        loadTasks();
      } catch { window.showToast('網路錯誤', 'err'); }
      finally { btn.disabled = false; }
    }

    async function deleteTask(id) {
      if (!confirm('確定要刪除這個任務嗎？')) return;
      try {
        const res = await window.authFetch(`/api/tasks/${id}`, { method: 'DELETE' });
        if (!res.ok) { const d = await res.json(); window.showToast(d.error, 'err'); return; }
        window.showToast('已刪除', 'ok');
        loadTasks();
      } catch { window.showToast('網路錯誤', 'err'); }
    }

    async function loadTasks() {
      const container = document.getElementById('taskList');
      try {
        const res = await window.authFetch('/api/tasks');
        const tasks = await res.json();
        if (!res.ok) throw new Error(tasks.error);

        taskCache = {};
        tasks.forEach(t => { taskCache[t.id] = t; });

        if (tasks.length === 0) {
          container.innerHTML = '<div class="empty">目前沒有任何任務 🎉</div>';
          return;
        }

        if (user.role === 'SYS_ADMIN') {
          // Group by user
          const groups = {};
          tasks.forEach(t => {
            const name = t.users ? t.users.name : '未知';
            if (!groups[name]) groups[name] = [];
            groups[name].push(t);
          });
          container.innerHTML = '';
          Object.entries(groups).forEach(([name, list]) => {
            const done = list.filter(t => t.status === 'done').length;
            const div = document.createElement('div');
            div.className = 'user-group';
            div.innerHTML = `
              <div class="user-group-title">
                <div class="avatar" style="width:28px;height:28px;font-size:0.75rem">${escHtml(name.charAt(0))}</div>
                ${escHtml(name)}
                <span class="badge badge-done">${done}/${list.length}</span>
              </div>
              ${list.map(t => taskHTML(t)).join('')}
            `;
            container.appendChild(div);
          });
        } else {
          const done = tasks.filter(t => t.status === 'done').length;
          container.innerHTML = `
            <div class="card">
              <div class="flex-between mb-3">
                <span class="text-muted text-sm">完成進度</span>
                <span class="badge badge-done">${done} / ${tasks.length} 完成</span>
              </div>
              <div style="background:var(--border);border-radius:99px;height:6px;margin-bottom:1rem">
                <div style="background:var(--success);height:6px;border-radius:99px;width:${tasks.length ? Math.round(done/tasks.length*100) : 0}%;transition:width 0.3s"></div>
              </div>
              ${tasks.map(t => taskHTML(t)).join('')}
            </div>`;
        }

        // Attach checkbox listeners
        container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          cb.addEventListener('change', () => toggleTask(cb.dataset.id, cb.checked));
        });
      } catch (e) {
        container.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
      }
    }

    let taskCache = {};

    function taskHTML(t) {
      const isDone = t.status === 'done';
      return `
        <div class="task-item ${isDone ? 'done' : ''}" id="task-${t.id}">
          <input type="checkbox" data-id="${t.id}" ${isDone ? 'checked' : ''}>
          <div class="task-body">
            <h3>${escHtml(t.title)}</h3>
            ${t.content ? `<p>${escHtml(t.content)}</p>` : ''}
          </div>
          <span class="badge ${isDone ? 'badge-done' : 'badge-pending'}" style="flex-shrink:0">${isDone ? '完成' : '待辦'}</span>
          ${isAdmin ? `
            <button class="btn btn-ghost btn-sm" style="flex-shrink:0;padding:0.2rem 0.4rem" onclick="editTask('${t.id}')">✏️ 編輯</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger);flex-shrink:0;padding:0.2rem 0.4rem" onclick="deleteTask('${t.id}')">🗑️ 刪除</button>` : ''}
        </div>`;
    }

    // 管理員行內編輯任務標題與說明
    function editTask(id) {
      const t = taskCache[id];
      const row = document.getElementById(`task-${id}`);
      if (!t || !row) return;
      row.innerHTML = `
        <div style="width:100%">
          <div class="form-group" style="margin-bottom:0.5rem">
            <input type="text" id="editTitle-${id}" value="${escAttr(t.title)}" placeholder="任務標題">
          </div>
          <div class="form-group" style="margin-bottom:0.5rem">
            <input type="text" id="editContent-${id}" value="${escAttr(t.content || '')}" placeholder="說明（選填）">
          </div>
          <div style="display:flex;gap:0.5rem;justify-content:flex-end">
            <button class="btn btn-sm" onclick="loadTasks()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="saveTask('${id}')">儲存</button>
          </div>
        </div>`;
      document.getElementById(`editTitle-${id}`).focus();
    }

    async function saveTask(id) {
      const title = document.getElementById(`editTitle-${id}`).value.trim();
      const content = document.getElementById(`editContent-${id}`).value.trim();
      if (!title) { window.showToast('任務標題不能為空', 'err'); return; }
      try {
        const res = await window.authFetch(`/api/tasks/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ title, content })
        });
        if (!res.ok) { const d = await res.json(); window.showToast(d.error || '更新失敗', 'err'); return; }
        window.showToast('✅ 已更新任務', 'ok');
      } catch { window.showToast('網路錯誤', 'err'); }
      loadTasks();
    }

    async function toggleTask(id, isDone) {
      const status = isDone ? 'done' : 'pending';
      try {
        const res = await window.authFetch(`/api/tasks/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status })
        });
        if (!res.ok) {
          const d = await res.json();
          window.showToast(d.error || '更新失敗', 'err');
          loadTasks();
          return;
        }
        const row = document.getElementById(`task-${id}`);
        if (row) {
          row.classList.toggle('done', isDone);
          const badge = row.querySelector('.badge');
          if (badge) {
            badge.className = 'badge ' + (isDone ? 'badge-done' : 'badge-pending');
            badge.textContent = isDone ? '完成' : '待辦';
          }
          const title = row.querySelector('h3');
          if (title) title.style.textDecoration = isDone ? 'line-through' : '';
        }
        window.showToast(isDone ? '✅ 已標記完成' : '↩️ 已取消完成', isDone ? 'ok' : '');
      } catch {
        window.showToast('網路錯誤', 'err');
        loadTasks();
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escAttr(s) {
      return escHtml(String(s)).replace(/"/g,'&quot;');
    }

    loadTasks();
    loadPhotos();
  </script>
</body>
</html>
